<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Doorbell 2.0 - Live Vision & Cloud Dashboard</title>
  
  <!-- TensorFlow.js & COCO-SSD Model -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f172a;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 { color: #38bdf8; margin-bottom: 5px; }

    /* Live Running Clock Styling */
    .clock-display {
      font-size: 1.1rem;
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
      background: #1e293b;
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid #334155;
    }

    .status-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 15px 0;
      flex-wrap: wrap;
    }

    .badge {
      padding: 10px 20px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 8px;
      background-color: #1e293b;
      border: 2px solid #334155;
      transition: all 0.3s ease;
    }

    .badge-count {
      border-color: #38bdf8;
      color: #38bdf8;
    }

    .video-container {
      position: relative;
      width: 640px;
      height: 480px;
      margin: 20px auto;
      border: 3px solid #38bdf8;
      border-radius: 12px;
      overflow: hidden;
      background-color: #000;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 640px;
      height: 480px;
    }

    /* On-Camera CCTV Style Overlay */
    .camera-overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: #38bdf8;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: bold;
      pointer-events: none;
      text-align: left;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    input[type="text"] {
      padding: 10px 15px;
      width: 320px;
      border-radius: 6px;
      border: 1px solid #334155;
      font-size: 1rem;
      background-color: #1e293b;
      color: #fff;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #38bdf8;
    }

    button {
      padding: 10px 20px;
      background-color: #38bdf8;
      border: none;
      color: #0f172a;
      font-weight: bold;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background-color: #7dd3fc; }
    
    .btn-manual-cam {
      background-color: #1e293b;
      color: #38bdf8;
      border: 1px solid #38bdf8;
    }
    
    .btn-manual-cam:hover {
      background-color: #38bdf8;
      color: #0f172a;
    }
  </style>
</head>
<body>

  <h1>🔔 Smart Doorbell 2.0</h1>
  
  <!-- Smooth Running Unblocked Clock -->
  <div id="clock-display" class="clock-display">📅 Loading Live Clock...</div>

  <div class="status-container">
    <div id="status-badge" class="badge">⏳ Waiting for Doorbell...</div>
    <div id="count-badge" class="badge badge-count">👥 People in Frame: 0</div>
  </div>

  <div class="video-container">
    <!-- Camera Overlay HUD -->
    <div id="camera-overlay" class="camera-overlay">
      <div>🔴 LIVE STREAM</div>
      <div id="hud-count">People Detected: 0</div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="controls">
    <button class="btn-manual-cam" onclick="startCamera()">📷 Test / Enable Camera</button>
    <input type="text" id="voice-input" placeholder="Type message for visitor...">
    <button onclick="speakMessage()">🔊 Speak Message</button>
  </div>

  <script>
    // ThingSpeak Credentials
    const CHANNEL_ID = "3433070";
    const READ_KEY = "B9SC45D5HXQ6ZVPG";
    const WRITE_KEY = "5WN4JU80SLVSZNXT";

    let model = null;
    let cameraStarted = false;
    let lastEntryId = null;
    let currentPersonCount = 0;
    let currentPriority = 1; // Saved Priority State
    let lastCloudSyncTime = 0;
    let isDetecting = false;

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusBadge = document.getElementById('status-badge');
    const countBadge = document.getElementById('count-badge');
    const hudCount = document.getElementById('hud-count');
    const clockDisplay = document.getElementById('clock-display');

    // 1. Independent Non-Blocking Clock Loop
    function updateClockSmooth() {
      const now = new Date();
      const dateOptions = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
      const dateString = now.toLocaleDateString('en-US', dateOptions);
      const timeString = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });

      clockDisplay.textContent = `📅 ${dateString} | 🕒 ${timeString}`;
      setTimeout(updateClockSmooth, 500);
    }
    updateClockSmooth();

    // 2. Load TensorFlow AI Vision Model
    async function loadAIModel() {
      console.log("Loading COCO-SSD AI Model...");
      model = await cocoSsd.load();
      console.log("✅ AI Model Loaded Successfully!");
    }
    loadAIModel();

    // 3. Reliable Camera Initialization
    async function startCamera() {
      if (cameraStarted) return;
      
      console.log("Opening camera stream...");
      try {
        const constraints = { 
          video: { width: { ideal: 640 }, height: { ideal: 480 } }, 
          audio: false 
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        await video.play();
        
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        cameraStarted = true;
        
        console.log("🎥 Camera Stream Live!");
        detectFrameLoop();

      } catch (err) {
        console.error("Camera Opening Failed:", err);
        if (err.name === 'NotAllowedError') {
          alert("⚠️ Camera blocked! Click the lock icon 🔒 next to your browser URL and allow Camera access.");
        }
      }
    }

    // 4. Throttled AI Object Detection Loop
    async function detectFrameLoop() {
      if (!cameraStarted || !model) return;

      if (!isDetecting) {
        isDetecting = true;
        
        try {
          const predictions = await model.detect(video);
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          let detectedCount = 0;

          predictions.forEach(prediction => {
            if (prediction.class === 'person' && prediction.score > 0.5) {
              detectedCount++;
              const [x, y, width, height] = prediction.bbox;

              // Bounding Box
              ctx.strokeStyle = '#38bdf8';
              ctx.lineWidth = 3;
              ctx.strokeRect(x, y, width, height);

              // Label
              ctx.fillStyle = '#38bdf8';
              ctx.font = '16px Segoe UI';
              ctx.fillText(`Person (${Math.round(prediction.score * 100)}%)`, x, y > 20 ? y - 10 : 20);
            }
          });

          currentPersonCount = detectedCount;
          countBadge.innerHTML = `👥 People in Frame: <b>${currentPersonCount}</b>`;
          hudCount.innerHTML = `People Detected: <b>${currentPersonCount}</b>`;

          syncCountToThingSpeak();
        } catch (e) {
          console.error("Detection Error:", e);
        }
        
        isDetecting = false;
      }

      setTimeout(() => requestAnimationFrame(detectFrameLoop), 100);
    }

    // 5. Fast Cloud Polling (1 Second Interval + Strict Priority Parser)
    async function pollThingSpeakFast() {
      try {
        const response = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_KEY}&nocache=${Date.now()}`);
        const latestFeed = await response.json();
        
        if (latestFeed && latestFeed.entry_id && latestFeed.entry_id !== lastEntryId) {
          lastEntryId = latestFeed.entry_id;
          
          const priority = parseInt(latestFeed.field1, 10);
          console.log("Cloud Event Received! Priority =", priority);

          // Update local priority variable
          currentPriority = priority;

          if (priority === 3 || priority >= 3) {
            statusBadge.innerHTML = "🚨 <b>EMERGENCY VISITOR</b>";
            statusBadge.style.borderColor = "#ef4444";
            statusBadge.style.color = "#ef4444";
          } else if (priority === 2) {
            statusBadge.innerHTML = "📦 <b>DELIVERY PERSON</b>";
            statusBadge.style.borderColor = "#3b82f6";
            statusBadge.style.color = "#3b82f6";
          } else {
            statusBadge.innerHTML = "🔔 <b>NORMAL VISITOR</b>";
            statusBadge.style.borderColor = "#22c55e";
            statusBadge.style.color = "#22c55e";
          }

          // Auto Start Camera on Trigger
          startCamera();
        }
      } catch (err) {
        console.error("Fast Poll Error:", err);
      }
    }

    // Poll ThingSpeak every 1 second
    setInterval(pollThingSpeakFast, 1000);

    // 6. Sync People Count back to ThingSpeak Field 2 ONLY (Crucial Fix)
    async function syncCountToThingSpeak() {
      const now = Date.now();
      if (now - lastCloudSyncTime > 15000) {
        lastCloudSyncTime = now;
        try {
          // ONLY UPDATE FIELD 2 so Field 1 (Priority) is NOT overwritten by the browser!
          const url = `https://api.thingspeak.com/update?api_key=${WRITE_KEY}&field2=${currentPersonCount}`;
          await fetch(url);
          console.log(`📊 Cloud Sync -> Field 2 (People Count): ${currentPersonCount}`);
        } catch (err) {
          console.error("Cloud Sync Error:", err);
        }
      }
    }

    // 7. Text-To-Speech
    function speakMessage() {
      const text = document.getElementById('voice-input').value;
      if (!text.trim()) return;

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
