<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doorbell 2.0 - Security Dashboard</title>
    
    <!-- TensorFlow.js and COCO-SSD for Real-Time Camera Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #334155; }
        h1 { font-size: 1.5rem; color: #38bdf8; }
        
        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        
        /* Video Container */
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* Status Badges */
        .badge { display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; margin-top: 10px; }
        .normal { background: #16a34a; }
        .delivery { background: #0284c7; }
        .emergency { background: #dc2626; }
        .waiting { background: #64748b; }
        
        button { width: 100%; padding: 12px; margin-top: 10px; background: #0284c7; color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0369a1; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>🔔 Doorbell 2.0 Security Dashboard</h1>
        <div style="font-size: 0.9rem; color: #94a3b8;">Channel ID: <strong>3433070</strong></div>
    </header>

    <div class="container">
        <!-- Live AI Camera Feed -->
        <div class="card">
            <h2>🎥 Live Door Camera</h2>
            <div class="video-wrapper" style="margin-top: 15px;">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="output-canvas"></canvas>
            </div>
            <button id="cam-btn" onclick="toggleCamera()">Start Door Camera</button>
        </div>

        <!-- System Status & Controls -->
        <div class="card">
            <h2>📊 Visitor Priority Alert</h2>
            <div id="priority-badge" class="badge waiting">Waiting for Wokwi Data...</div>
            <p id="visitor-text" style="margin-top: 10px; color: #cbd5e1;">Press button in Wokwi simulation...</p>

            <hr style="border-color: #334155; margin: 20px 0;">

            <h2>👥 People Near Door</h2>
            <h1 id="people-count" style="font-size: 3rem; color: #38bdf8; margin-top: 5px;">0</h1>

            <hr style="border-color: #334155; margin: 20px 0;">

            <h2>🎙️ Voice Message to Visitor</h2>
            <input type="text" id="voice-input" placeholder="e.g., Leave the package at the door">
            <button onclick="speakMessage()" style="background: #16a34a;">🔊 Speak Message</button>
        </div>
    </div>

    <script>
        // --- ThingSpeak Pre-Configured Credentials ---
        const CHANNEL_ID = "3433070";
        const READ_API_KEY = "B9SC45D5HXQ6ZVPG";

        let video = document.getElementById('webcam');
        let canvas = document.getElementById('output-canvas');
        let ctx = canvas.getContext('2d');
        let isCameraOn = false;
        let model = null;

        // Load AI Object Detection Model
        cocoSsd.load().then(loadedModel => { model = loadedModel; });

        async function toggleCamera() {
            const btn = document.getElementById('cam-btn');
            if (!isCameraOn) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    isCameraOn = true;
                    btn.innerText = "🛑 Stop Camera";
                    btn.style.background = "#dc2626";
                    video.addEventListener('loadeddata', () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        detectFrame();
                    });
                } catch (err) {
                    alert("Unable to access camera!");
                }
            } else {
                let stream = video.srcObject;
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                isCameraOn = false;
                btn.innerText = "🎥 Start Door Camera";
                btn.style.background = "#0284c7";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('people-count').innerText = "0";
            }
        }

        async function detectFrame() {
            if (!isCameraOn) return;
            if (model) {
                const predictions = await model.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let personCount = 0;

                predictions.forEach(prediction => {
                    if (prediction.class === 'person') {
                        personCount++;
                        const [x, y, width, height] = prediction.bbox;
                        ctx.strokeStyle = '#38bdf8';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x, y, width, height);
                        ctx.fillStyle = '#38bdf8';
                        ctx.font = '16px Arial';
                        ctx.fillText(`Person (${Math.round(prediction.score * 100)}%)`, x, y > 10 ? y - 5 : 10);
                    }
                });
                document.getElementById('people-count').innerText = personCount;
            }
            requestAnimationFrame(detectFrame);
        }

        async function fetchThingSpeakData() {
            try {
                const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=1&api_key=${READ_API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.feeds.length > 0) {
                    const lastFeed = data.feeds[0];
                    const priority = parseInt(lastFeed.field1);
                    const badge = document.getElementById('priority-badge');
                    const text = document.getElementById('visitor-text');

                    if (priority === 1) {
                        badge.className = "badge normal";
                        badge.innerText = "🔔 NORMAL VISITOR";
                        text.innerText = "1 Press: Someone is at the front door.";
                    } else if (priority === 2) {
                        badge.className = "badge delivery";
                        badge.innerText = "📦 DELIVERY PERSON";
                        text.innerText = "2 Presses: Package delivery person.";
                    } else if (priority >= 3) {
                        badge.className = "badge emergency";
                        badge.innerText = "🚨 EMERGENCY VISITOR";
                        text.innerText = "3+ Presses: Urgent/Emergency visitor!";
                    }
                }
            } catch (err) {
                console.error("Error connecting to ThingSpeak:", err);
            }
        }

        function speakMessage() {
            const input = document.getElementById('voice-input').value;
            if (input) {
                const speech = new SpeechSynthesisUtterance(input);
                window.speechSynthesis.speak(speech);
            }
        }

        // Poll ThingSpeak every 3 seconds for updates from Wokwi
        setInterval(fetchThingSpeakData, 3000);
    </script>
</body>
</html>
